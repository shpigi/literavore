services:
  literavore:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - literavore-data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LITERAVORE_CONFIG=/app/config/default.yml
      - LITERAVORE_DATA_DIR=/data
    restart: unless-stopped

volumes:
  literavore-data:

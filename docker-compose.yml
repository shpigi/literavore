services:
  api:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    command: literavore serve
    ports:
      - "8000:8000"
    volumes:
      - /home/lavi/data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LITERAVORE_CONFIG=/app/config/default.yml
      - LITERAVORE_DATA_DIR=/data
    restart: unless-stopped

  ui:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    command: literavore ui
    ports:
      - "8501:8501"
    volumes:
      - /home/lavi/data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LITERAVORE_CONFIG=/app/config/default.yml
      - LITERAVORE_DATA_DIR=/data
      - LITERAVORE_API_URL=http://api:8000
      - HOME=/tmp
    depends_on:
      - api
    restart: unless-stopped
